<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Memory Match Pro — Flip cards, find pairs, beat the clock!">
  <title>Memory Match Pro</title>

  <!-- ✅ PASTE YOUR GOOGLE ADSENSE SCRIPT HERE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2698792090132781"
     crossorigin="anonymous"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0e1a;
      --card:    #1a1830;
      --surface: #232140;
      --primary: #38bdf8;
      --accent:  #fbbf24;
      --success: #4ade80;
      --danger:  #f87171;
      --purple:  #a78bfa;
      --text:    #e2e0f0;
      --muted:   #6b6880;
      --border:  rgba(255,255,255,0.07);
      --radius:  16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    .ad-slot {
      width: 100%;
      max-width: 600px;
      min-height: 90px;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 1px;
    }

    .site-title {
      font-family: 'Space Mono', monospace;
      font-size: 1.25rem;
      letter-spacing: 3px;
      text-align: center;
    }

    .site-title span { color: var(--primary); }

    .best-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
    }

    .hud {
      width: 100%;
      max-width: 600px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .hud-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hud-label {
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hud-value {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
    }

    .timer-bar-wrap {
      width: 100%;
      max-width: 600px;
      height: 5px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      border-radius: 3px;
      background: var(--primary);
      transition: width 1s linear, background 0.4s;
    }

    .menu {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }

    .btn {
      padding: 11px 20px;
      border: none;
      border-radius: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.96); }

    .btn-easy   { background: var(--success); color: #0f0e1a; }
    .btn-medium { background: var(--accent);  color: #0f0e1a; }
    .btn-hard   { background: var(--danger);  color: #fff; }
    .btn-reset  { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-sound  { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-play   { background: var(--primary); color: #0f0e1a; margin-top: 6px; width: 100%; padding: 13px; font-size: 0.95rem; border: none; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; cursor: pointer; }

    .powerup-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }

    .pu-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s, transform 0.1s;
    }

    .pu-btn:hover  { border-color: var(--primary); color: var(--text); }
    .pu-btn:active { transform: scale(0.95); }
    .pu-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .pu-btn span   { color: var(--text); font-weight: 700; }

    /* ── Board ── */
    #gameBoard {
      display: grid;
      gap: 8px;
      justify-content: center;
      width: 100%;
      max-width: 600px;
      padding: 4px;
    }

    /* ── Card 3D ── */
    .card {
      perspective: 700px;
      cursor: pointer;
      /* size set by JS */
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
      border-radius: 12px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-back, .card-front {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 1.4rem;
      color: var(--muted);
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
    }

    .card:hover:not(.flipped):not(.matched) .card-back {
      background: var(--surface);
      border-color: rgba(56,189,248,0.35);
    }

    .card-front {
      background: var(--surface);
      border: 1px solid rgba(56,189,248,0.2);
      transform: rotateY(180deg);
      user-select: none;
    }

    .card.matched .card-front {
      background: rgba(74,222,128,0.12);
      border-color: var(--success);
      animation: match-pop 0.45s ease;
    }

    @keyframes match-pop {
      0%   { transform: rotateY(180deg) scale(1); }
      45%  { transform: rotateY(180deg) scale(1.13); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card.wrong .card-inner {
      animation: card-shake 0.36s ease;
    }

    @keyframes card-shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-7px); }
      75%      { transform: rotateY(180deg) translateX(7px); }
    }

    /* ── Result Panel ── */
    .result-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 22px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .result-panel.show { display: flex; }

    .result-emoji { font-size: 3rem; }

    .result-title {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      letter-spacing: 2px;
    }

    .result-stars { font-size: 1.7rem; letter-spacing: 4px; }
    .result-sub   { font-size: 0.82rem; color: var(--muted); }

    /* ── Toast ── */
    #comboToast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: var(--accent);
      color: #0f0e1a;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 8px 24px;
      border-radius: 30px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }

    #comboToast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    @media (max-width: 480px) {
      .hud { grid-template-columns: repeat(2,1fr); }
      .site-title { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- TOP AD -->
  <div class="ad-slot">

    <ins class="adsbygoogle" style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"

         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    AD SPACE
  </div>

  <h1 class="site-title">🧠 MEMORY <span>MATCH PRO</span></h1>
  <p class="best-label">BEST: <span id="bestEl">—</span></p>

  <div class="hud">
    <div class="hud-card">
      <span class="hud-label">Moves</span>
      <span class="hud-value" id="movesEl">0</span>
    </div>
    <div class="hud-card">
      <span class="hud-label">Matches</span>
      <span class="hud-value" id="matchesEl">0/0</span>
    </div>
    <div class="hud-card">
      <span class="hud-label">Stars</span>
      <span class="hud-value" id="starsEl">⭐⭐⭐</span>
    </div>
    <div class="hud-card">
      <span class="hud-label">Time</span>
      <span class="hud-value" id="timerVal">--</span>
    </div>
  </div>

  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timerBar"></div>
  </div>

  <div class="menu">
    <button class="btn btn-easy"   onclick="startGame('easy')">🟢 Easy</button>
    <button class="btn btn-medium" onclick="startGame('medium')">🟡 Medium</button>
    <button class="btn btn-hard"   onclick="startGame('hard')">🔴 Hard</button>
    <button class="btn btn-reset"  onclick="resetGame()">🔄 Reset</button>
    <button class="btn btn-sound"  onclick="toggleSound()" id="soundBtn">🔊 Sound</button>
  </div>

  <div class="powerup-row">
    <button class="pu-btn" id="btnHint"   onclick="useHint()">💡 Hint <span id="hintCount">2</span></button>
    <button class="pu-btn" id="btnFreeze" onclick="useFreeze()">❄️ Freeze <span id="freezeCount">1</span></button>
    <button class="pu-btn" id="btnPeek"   onclick="usePeek()">👁 Peek <span id="peekCount">1</span></button>
  </div>

  <div id="gameBoard"></div>

  <div class="result-panel" id="resultPanel">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stars" id="resultStars"></div>
    <div class="result-sub"   id="resultSub"></div>
    <button class="btn-play" onclick="startGame(window._lastLevel||'easy')">▶ Play Again</button>
  </div>

  <!-- BOTTOM AD -->
  <div class="ad-slot">

    <ins class="adsbygoogle" style="display:block"

         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    AD SPACE
  </div>

  <div id="comboToast"></div>

  <script src="memory.js"></script>
</body>
</html>
