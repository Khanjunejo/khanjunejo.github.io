<!DOCTYPE html>
<html>
<head>
<title>Memory Game</title>
<link rel="stylesheet" href="style.css">

<style>
 h2 { text-align: center; margin-top: 20px; } 

 #menu { text-align:center; margin-top:20px; }

#gameBoard {
display: grid;
gap: 10px;
justify-content: center;
margin-top: 20px;
}

.card {
width: 80px;
height: 80px;
background: #00f7ff;
display: flex;
justify-content: center;
align-items: center;
font-size: 30px;
cursor: pointer;
border-radius: 10px;
transition: 0.3s;
}

.card.flipped {
background: white;
color: black;
transform: rotateY(180deg);
}

.card.hide {
visibility: hidden;
}

#score, #timer, #stars {
text-align: center;
margin-top: 10px;
font-size: 18px;
} 

 button {
margin: 5px;
padding: 10px;
border-radius: 8px;
cursor: pointer;
}

 ⭐ WIN ANIMATION 
 #winStars {
font-size: 30px;
text-align: center;
margin-top: 15px;
animation: pop 1s infinite alternate;
} 

 @keyframes pop { 
 from { transform: scale(1); } 
 to { transform: scale(1.3); } 
 }  

</style>
</head>

<body>

<h2>🧠 Memory Game</h2>

<div id="menu">
<button onclick="startGame('easy')">Easy (2x3)</button>
<button onclick="startGame('medium')">Medium (4x4)</button>
<button onclick="startGame('hard')">Hard (6x6)</button>
</div>

<p id="timer">⏱ Time: 0</p>
<p id="score">Moves: 0 | Matches: 0</p>
<p id="stars">⭐ Stars: 0</p>

<div id="gameBoard"></div>

<button onclick="resetMemory()">🔄 Reset Game</button>

<div id="winStars"></div>

<script src="memory.js"></script>
<script src="sounds.js"></script>

</body>
</html>
