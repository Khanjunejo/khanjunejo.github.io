<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPS Pro</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game-card {
  background:#111827;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:350px;
}

button {
  font-size:30px;
  margin:10px;
  padding:10px 20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="game-card">

<h2>✊✋✌️ RPS Game</h2>

<div id="msg">Choose your move</div>

<!-- 🔥 GAME BUTTONS -->
<button onclick="play('rock')">✊</button>
<button onclick="play('paper')">✋</button>
<button onclick="play('scissors')">✌️</button>

</div>

<script>
let popCooldown = false;

// =========================
// 🔥 POPUNDER FUNCTION (FIXED)
// =========================
function triggerPopUnder(){

  if(popCooldown) return; // avoid spam
  popCooldown = true;

  let s = document.createElement("script");
  s.src = "https://pl29643779.effectivecpmnetwork.com/0f/ff/3d/0fff3d9c24531b389bd350b97b1a7d0e.js";
  s.async = true;

  document.body.appendChild(s);

  // cooldown 10 sec
  setTimeout(()=> popCooldown = false, 10000);
}

// =========================
// 🎮 GAME LOGIC
// =========================
function play(userChoice){

  triggerPopUnder(); // 🔥 POPUNDER TRIGGERS ON CLICK

  const choices = ["rock","paper","scissors"];
  const cpu = choices[Math.floor(Math.random()*3)];

  let result = "";

  if(userChoice === cpu){
    result = "DRAW 🤝";
  }
  else if(
    (userChoice === "rock" && cpu === "scissors") ||
    (userChoice === "paper" && cpu === "rock") ||
    (userChoice === "scissors" && cpu === "paper")
  ){
    result = "YOU WIN 🔥";
  }
  else{
    result = "YOU LOSE 💀";
  }

  document.getElementById("msg").innerText =
    `You: ${userChoice} | CPU: ${cpu} → ${result}`;
}
</script>

</div>

</body>
</html>
