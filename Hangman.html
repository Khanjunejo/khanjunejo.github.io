<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0b0a15;
  --card:    #15132a;
  --surface: #1e1c35;
  --surface2:#272550;
  --primary: #38bdf8;
  --accent:  #fbbf24;
  --success: #4ade80;
  --danger:  #f87171;
  --purple:  #a78bfa;
  --text:    #e2e0f0;
  --muted:   #6b6880;
  --border:  rgba(255,255,255,0.07);
  --radius:  16px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 14px;
}

/* ── Ad Slots ── */
.ad-slot {
  width: 100%;
  max-width: 700px;
  min-height: 90px;
  background: var(--card);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 0.72rem;
  letter-spacing: 1px;
}

/* ── Header ── */
.site-title {
  font-family: 'Space Mono', monospace;
  font-size: 1.6rem;
  letter-spacing: 4px;
  text-align: center;
  color: var(--text);
}
.site-title span { color: var(--primary); }

/* ── Stats Bar ── */
.stats-bar {
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.stat-label {
  font-size: 0.55rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
}

/* ── Main Game Area ── */
.game-wrap {
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 14px;
}

@media (max-width: 560px) {
  .game-wrap { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

/* ── Canvas Panel ── */
.canvas-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  gap: 12px;
}

canvas {
  border-radius: 10px;
  background: var(--surface);
  width: 100%;
  max-width: 188px;
}

/* ── Lives ── */
.lives-row {
  display: flex;
  gap: 4px;
  justify-content: center;
  flex-wrap: wrap;
}

.heart {
  font-size: 1.1rem;
  transition: transform 0.3s, opacity 0.3s;
}

.heart.lost {
  opacity: 0.2;
  transform: scale(0.7);
}

/* ── Difficulty Badge ── */
.diff-badge {
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 12px;
  border-radius: 20px;
  font-weight: 700;
}

.diff-easy   { background: rgba(74,222,128,0.15); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
.diff-medium { background: rgba(251,191,36,0.15);  color: var(--accent);  border: 1px solid rgba(251,191,36,0.3); }
.diff-hard   { background: rgba(248,113,113,0.15); color: var(--danger);  border: 1px solid rgba(248,113,113,0.3); }

/* ── Word Panel ── */
.word-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

.cat-label {
  font-size: 0.62rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Word Display ── */
.word-display {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 56px;
  align-items: flex-end;
}

.letter-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.letter-char {
  font-family: 'Space Mono', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  min-width: 28px;
  text-align: center;
  color: var(--primary);
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.3s, transform 0.3s;
}

.letter-char.revealed {
  opacity: 1;
  transform: translateY(0);
}

.letter-char.hint-reveal { color: var(--accent); }

.letter-line {
  width: 28px;
  height: 2px;
  background: var(--surface2);
  border-radius: 1px;
}

/* ── Wrong Letters ── */
.wrong-letters {
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  color: var(--danger);
  letter-spacing: 3px;
  min-height: 1.2rem;
}

/* ── Hint & Timer ── */
.hint-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

.hint-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 6px 16px;
  font-size: 0.78rem;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  transition: background 0.2s, color 0.2s;
}

.hint-btn:hover:not(:disabled) { background: var(--accent); color: #0b0a15; }
.hint-btn:disabled { border-color: var(--muted); color: var(--muted); cursor: not-allowed; }

.timer-badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  transition: color 0.3s;
}

.timer-badge.urgent { color: var(--danger); animation: pulse-timer 0.5s ease infinite alternate; }
@keyframes pulse-timer { from { opacity: 1; } to { opacity: 0.5; } }

/* ── Keyboard ── */
.keyboard-wrap {
  width: 100%;
  max-width: 700px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.keyboard-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}

.key {
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  background: var(--surface2);
  color: var(--text);
  transition: background 0.15s, transform 0.1s, opacity 0.2s;
  border: 1px solid var(--border);
}

.key:hover:not(:disabled) { background: var(--primary); color: #0b0a15; transform: translateY(-2px); }
.key:active:not(:disabled) { transform: translateY(0); }

.key:disabled { cursor: not-allowed; }
.key.correct { background: var(--success) !important; color: #0b0a15 !important; opacity: 0.85; }
.key.wrong   { background: var(--danger)  !important; color: #fff       !important; opacity: 0.45; }

@media (max-width: 400px) {
  .key { width: 32px; height: 36px; font-size: 0.75rem; }
}

/* ── Controls ── */
.controls {
  width: 100%;
  max-width: 700px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}

.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--primary); color: #0b0a15; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger   { background: var(--danger);  color: #fff; }

/* ── Overlay / Modal ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(11,10,21,0.88);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 36px 28px;
  border-radius: 20px;
  max-width: 440px;
  width: 92%;
  transform: scale(0.85);
  transition: transform 0.3s;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.overlay.active .modal { transform: scale(1); }

.modal-emoji { font-size: 3rem; }
.modal-title { font-family: 'Space Mono', monospace; font-size: 1.4rem; letter-spacing: 2px; }
.modal-sub   { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }
.modal-word  { font-family: 'Space Mono', monospace; font-size: 1.4rem; color: var(--primary); letter-spacing: 4px; }

.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.cat-btn {
  padding: 14px 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.1s;
}

.cat-btn:hover { background: var(--surface2); border-color: var(--primary); transform: translateY(-2px); }
.cat-btn:active { transform: scale(0.97); }

.diff-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.diff-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}

.diff-btn.active-easy   { background: rgba(74,222,128,0.2); border-color: var(--success); color: var(--success); }
.diff-btn.active-medium { background: rgba(251,191,36,0.2);  border-color: var(--accent);  color: var(--accent); }
.diff-btn.active-hard   { background: rgba(248,113,113,0.2); border-color: var(--danger);  color: var(--danger); }

/* ── Win burst animation ── */
@keyframes burst {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.06); }
  60%  { transform: scale(0.97); }
  100% { transform: scale(1); }
}

.win-burst { animation: burst 0.5s ease; }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  padding: 10px 24px;
  border-radius: 30px;
  border: 1px solid var(--border);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
  letter-spacing: 1px;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<!-- BOTTOM AD SLOT -->
<div class="ad-slot">

<!-- Category Modal -->
<div class="overlay active" id="catModal">
  <div class="modal">
    <div class="modal-emoji">🗂</div>
    <div class="modal-title">CHOOSE CATEGORY</div>

<!-- Difficulty Modal -->
<div class="overlay" id="diffModal">
  <div class="modal">
    <div class="modal-emoji">⚙️</div>

<div class="overlay" id="resultModal">

    <button class="btn btn-primary" onclick="nextWord()" style="width:100%;">▶ Next Word</button>
    <button class="btn btn-secondary" onclick="openCatModal()" style="width:100%;">🗂 Change Category</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── WORD BANK ──────────────────────────────────────────────────
const WORDS = {
  "🌍 Countries":    ["PAKISTAN","GERMANY","AUSTRALIA","BRAZIL","JAPAN","CANADA","EGYPT","FRANCE","ITALY","ARGENTINA","PORTUGAL","NETHERLANDS","SWITZERLAND","INDONESIA","MALAYSIA"],
  "⚽ Sports":       ["CRICKET","FOOTBALL","BASKETBALL","BADMINTON","ATHLETICS","TENNIS","HOCKEY","BOXING","SWIMMING","VOLLEYBALL","WRESTLING","SKATEBOARD","GYMNASTICS","ARCHERY"],
  "🦁 Animals":      ["LION","ELEPHANT","TIGER","KANGAROO","GIRAFFE","DOLPHIN","PANDA","CHEETAH","CROCODILE","FLAMINGO","ORANGUTAN","RHINOCEROS","CHIMPANZEE","WOLVERINE"],
  "🍕 Food":         ["PIZZA","BURGER","SUSHI","PASTA","TACOS","BROWNIE","WAFFLES","PANCAKE","LASAGNA","NOODLES","SANDWICH","CROISSANT","DUMPLINGS","CHEESECAKE"],
  "🎬 Movies":       ["INCEPTION","AVATAR","TITANIC","GLADIATOR","INTERSTELLAR","PARASITE","JOKER","SHAWSHANK","AVENGERS","FROZEN","MATRIX","CASABLANCA","BRAVEHEART"],
  "💻 Technology":   ["ALGORITHM","DATABASE","KEYBOARD","JAVASCRIPT","FRAMEWORK","DEBUGGING","NETWORK","SOFTWARE","COMPILER","INTERNET","BLOCKCHAIN","CYBERSECURITY","ARTIFICIAL"],
  "🎵 Music":        ["GUITAR","PIANO","DRUMS","VIOLIN","TRUMPET","SAXOPHONE","ORCHESTRA","HARMONY","MELODY","RHYTHM","SYMPHONY","ACOUSTIC","MICROPHONE"],
  "🏛 History":      ["PHARAOH","NAPOLEON","COLUMBUS","CLEOPATRA","RENAISSANCE","REVOLUTION","MEDIEVAL","CRUSADES","DYNASTY","MYTHOLOGY","GLADIATOR","CIVILIZATION"]
};

// ── DIFFICULTY CONFIG ───────────────────────────────────────────
const DIFF_CONFIG = {
  easy:   { lives: 8, timer: 0,   hintCost: 0, scoreMul: 1   },
  medium: { lives: 6, timer: 0,   hintCost: 0, scoreMul: 1.5 },
  hard:   { lives: 4, timer: 60,  hintCost: 0, scoreMul: 2.5 }
};

// ── STATE ──────────────────────────────────────────────────────
let category    = "";
let word        = "";
let guessed     = new Set();
let wrongCount  = 0;
let maxLives    = 6;
let gameOver    = false;
let difficulty  = "medium";
let hintUses    = 2;
let timeLeft    = 0;
let ticker      = null;
let hintRevealed = new Set();

let score      = parseInt(localStorage.getItem("hm_score")      || "0");
let streak     = parseInt(localStorage.getItem("hm_streak")     || "0");
let bestStreak = parseInt(localStorage.getItem("hm_bestStreak") || "0");
let wins       = parseInt(localStorage.getItem("hm_wins")       || "0");

// ── DOM ────────────────────────────────────────────────────────
const canvas      = document.getElementById("hangmanCanvas");
const ctx         = canvas.getContext("2d");
const wordDisplay = document.getElementById("wordDisplay");
const wrongEl     = document.getElementById("wrongLetters");
const catLabel    = document.getElementById("catLabel");
const livesRow    = document.getElementById("livesRow");
const diffBadge   = document.getElementById("diffBadge");
const hintBtn     = document.getElementById("hintBtn");
const hintLeftEl  = document.getElementById("hintLeft");
const timerBadge  = document.getElementById("timerBadge");
const keyboardEl  = document.getElementById("keyboardEl");
const toastEl     = document.getElementById("toast");

const catModal    = document.getElementById("catModal");
const diffModal   = document.getElementById("diffModal");
const resultModal = document.getElementById("resultModal");

// ── AUDIO ──────────────────────────────────────────────────────
let actx = null;
function au() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }

function beep(type) {
  try {
    au();
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.connect(g); g.connect(actx.destination);

    if (type === "correct") {
      o.type = "triangle";
      o.frequency.setValueAtTime(523, t);
      o.frequency.setValueAtTime(659, t + 0.08);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.start(t); o.stop(t + 0.22);
    } else if (type === "wrong") {
      o.type = "sawtooth";
      o.frequency.setValueAtTime(220, t);
      o.frequency.linearRampToValueAtTime(110, t + 0.2);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);
    } else if (type === "win") {
      [523, 659, 784, 1046].forEach((f, i) => {
        const oo = actx.createOscillator();
        const gg = actx.createGain();
        oo.connect(gg); gg.connect(actx.destination);
        oo.type = "triangle";
        oo.frequency.setValueAtTime(f, t + i * 0.1);
        gg.gain.setValueAtTime(0.14, t + i * 0.1);
        gg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.18);
        oo.start(t + i * 0.1); oo.stop(t + i * 0.1 + 0.18);
      });
    } else if (type === "lose") {
      o.type = "sawtooth";
      o.frequency.setValueAtTime(330, t);
      o.frequency.linearRampToValueAtTime(80, t + 0.6);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      o.start(t); o.stop(t + 0.7);
    } else if (type === "hint") {
      o.type = "sine";
      o.frequency.setValueAtTime(880, t);
      o.frequency.setValueAtTime(1100, t + 0.08);
      g.gain.setValueAtTime(0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o.start(t); o.stop(t + 0.2);
    }
  } catch(e) {}
}

// ── DRAW HANGMAN ───────────────────────────────────────────────
function drawHangman(step) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Gallows
  ctx.strokeStyle = "#3d3a5c";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(20, H - 10); ctx.lineTo(W - 20, H - 10); // base
  ctx.moveTo(50, H - 10); ctx.lineTo(50, 18);           // pole
  ctx.lineTo(W - 40, 18);                                // top
  ctx.lineTo(W - 40, 46);                                // rope
  ctx.stroke();

  if (step === 0) return;

  ctx.strokeStyle = "#e2e0f0";
  ctx.lineWidth = 3.5;

  const cx = W - 40;

  // 1. Head
  if (step >= 1) {
    ctx.beginPath();
    ctx.arc(cx, 64, 18, 0, Math.PI * 2);
    ctx.stroke();
    // Face expression based on lives lost
    drawFace(cx, 64, step);
  }
  // 2. Body
  if (step >= 2) { ctx.beginPath(); ctx.moveTo(cx, 82); ctx.lineTo(cx, 148); ctx.stroke(); }
  // 3. Left arm
  if (step >= 3) { ctx.beginPath(); ctx.moveTo(cx, 100); ctx.lineTo(cx - 28, 126); ctx.stroke(); }
  // 4. Right arm
  if (step >= 4) { ctx.beginPath(); ctx.moveTo(cx, 100); ctx.lineTo(cx + 28, 126); ctx.stroke(); }
  // 5. Left leg
  if (step >= 5) { ctx.beginPath(); ctx.moveTo(cx, 148); ctx.lineTo(cx - 28, 188); ctx.stroke(); }
  // 6. Right leg
  if (step >= 6) { ctx.beginPath(); ctx.moveTo(cx, 148); ctx.lineTo(cx + 28, 188); ctx.stroke(); }
  // 7. Left foot
  if (step >= 7) { ctx.beginPath(); ctx.moveTo(cx - 28, 188); ctx.lineTo(cx - 42, 195); ctx.stroke(); }
  // 8. Right foot
  if (step >= 8) { ctx.beginPath(); ctx.moveTo(cx + 28, 188); ctx.lineTo(cx + 42, 195); ctx.stroke(); }
}

function drawFace(cx, cy, step) {
  ctx.lineWidth = 2;
  const dying = step >= maxLives;

  // Eyes
  if (dying) {
    // X eyes
    [[cx-7,cy-5],[cx+7,cy-5]].forEach(([ex,ey]) => {
      ctx.beginPath();
      ctx.moveTo(ex-4,ey-4); ctx.lineTo(ex+4,ey+4);
      ctx.moveTo(ex+4,ey-4); ctx.lineTo(ex-4,ey+4);
      ctx.strokeStyle = var_danger();
      ctx.stroke();
    });
  } else {
    // Normal eyes
    ctx.fillStyle = "#e2e0f0";
    ctx.beginPath(); ctx.arc(cx - 7, cy - 5, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 7, cy - 5, 3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.strokeStyle = "#e2e0f0";
  ctx.lineWidth = 2;

  // Mouth
  if (dying) {
    ctx.beginPath();
    ctx.arc(cx, cy + 8, 6, 0, Math.PI, false); // frown (upside-down arc)
    ctx.stroke();
  } else if (step >= 3) {
    ctx.beginPath();
    ctx.arc(cx, cy + 10, 5, 0, Math.PI, false);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(cx, cy + 8, 5, 0, Math.PI);
    ctx.stroke();
  }
}

function var_danger() { return "#f87171"; }

// ── KEYBOARD ───────────────────────────────────────────────────
const ROWS = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];

function buildKeyboard() {
  keyboardEl.innerHTML = "";
  ROWS.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "keyboard-row";
    for (const ch of row) {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.id = "key-" + ch;
      btn.textContent = ch;
      btn.addEventListener("click", () => guess(ch));
      rowDiv.appendChild(btn);
    }
    keyboardEl.appendChild(rowDiv);
  });
}

// ── CATEGORY MODAL ─────────────────────────────────────────────
function buildCatGrid() {
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  Object.keys(WORDS).forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.textContent = cat;
    btn.onclick = () => selectCategory(cat);
    grid.appendChild(btn);
  });
}

function openCatModal() {
  buildCatGrid();
  catModal.classList.add("active");
  resultModal.classList.remove("active");
}

function selectCategory(cat) {
  category = cat;
  catModal.classList.remove("active");
  initGame();
}

// ── DIFFICULTY ─────────────────────────────────────────────────
function openDiffModal() { diffModal.classList.add("active"); }
function closeDiffModal() { diffModal.classList.remove("active"); }

function setDiff(d) {
  difficulty = d;
  maxLives   = DIFF_CONFIG[d].lives;
  // Update active button styles
  document.querySelectorAll(".diff-btn").forEach((b, i) => {
    b.className = "diff-btn";
    if (["easy","medium","hard"][i] === d) b.classList.add("active-" + d);
  });
  // Update badge
  diffBadge.className = "diff-badge diff-" + d;
  diffBadge.textContent = d.toUpperCase();
}

// ── INIT GAME ──────────────────────────────────────────────────
function initGame() {
  if (!category) { openCatModal(); return; }

  clearInterval(ticker);
  guessed       = new Set();
  hintRevealed  = new Set();
  wrongCount    = 0;
  gameOver      = false;
  hintUses      = 2;
  maxLives      = DIFF_CONFIG[difficulty].lives;

  const pool = WORDS[category];
  word = pool[Math.floor(Math.random() * pool.length)];

  hintLeftEl.textContent = "(2 left)";
  hintBtn.disabled = false;
  catLabel.textContent   = category;
  diffBadge.className    = "diff-badge diff-" + difficulty;
  diffBadge.textContent  = difficulty.toUpperCase();

  buildKeyboard();
  renderWord();
  renderLives();
  updateStats();
  drawHangman(0);
  wrongEl.textContent = "";

  // Timer for hard mode
  if (difficulty === "hard") {
    timeLeft = DIFF_CONFIG.hard.timer;
    timerBadge.textContent = "⏱ " + timeLeft + "s";
    timerBadge.classList.remove("urgent");
    ticker = setInterval(() => {
      if (gameOver) { clearInterval(ticker); return; }
      timeLeft--;
      timerBadge.textContent = "⏱ " + timeLeft + "s";
      if (timeLeft <= 10) timerBadge.classList.add("urgent");
      if (timeLeft <= 0) {
        clearInterval(ticker);
        endGame(false, true);
      }
    }, 1000);
  } else {
    timerBadge.textContent = "⏱ --";
    timerBadge.classList.remove("urgent");
  }
}

// ── RENDER WORD ────────────────────────────────────────────────
function renderWord() {
  wordDisplay.innerHTML = "";
  let allRevealed = true;

  for (const ch of word) {
    const box = document.createElement("div");
    box.className = "letter-box";

    const charEl = document.createElement("div");
    charEl.className = "letter-char";

    if (guessed.has(ch)) {
      charEl.textContent = ch;
      charEl.classList.add("revealed");
      if (hintRevealed.has(ch)) charEl.classList.add("hint-reveal");
    } else {
      charEl.textContent = ch;
      allRevealed = false;
    }

    const line = document.createElement("div");
    line.className = "letter-line";

    box.appendChild(charEl);
    box.appendChild(line);
    wordDisplay.appendChild(box);
  }

  return allRevealed;
}

// ── RENDER LIVES ───────────────────────────────────────────────
function renderLives() {
  livesRow.innerHTML = "";
  for (let i = 0; i < maxLives; i++) {
    const h = document.createElement("span");
    h.className = "heart" + (i >= maxLives - wrongCount ? " lost" : "");
    h.textContent = "❤️";
    livesRow.appendChild(h);
  }
}

// ── GUESS ──────────────────────────────────────────────────────
function guess(ch) {
  if (gameOver || guessed.has(ch)) return;
  guessed.add(ch);

  const btn = document.getElementById("key-" + ch);

  if (word.includes(ch)) {
    if (btn) { btn.disabled = true; btn.classList.add("correct"); }
    beep("correct");
    const won = renderWord();
    if (won) { setTimeout(() => endGame(true), 300); }
  } else {
    wrongCount++;
    if (btn) { btn.disabled = true; btn.classList.add("wrong"); }
    beep("wrong");
    drawHangman(wrongCount);
    renderLives();

    // Show wrong letters
    const wrongLetters = [...guessed].filter(c => !word.includes(c));
    wrongEl.textContent = wrongLetters.join("  ");

    if (wrongCount >= maxLives) { setTimeout(() => endGame(false), 300); }
  }
}

// ── HINT ───────────────────────────────────────────────────────
function useHint() {
  if (hintUses <= 0 || gameOver) return;
  const unguessed = [...word].filter(ch => !guessed.has(ch));
  if (unguessed.length === 0) return;

  hintUses--;
  hintLeftEl.textContent = "(" + hintUses + " left)";
  if (hintUses <= 0) hintBtn.disabled = true;

  const ch = unguessed[Math.floor(Math.random() * unguessed.length)];
  hintRevealed.add(ch);
  beep("hint");
  showToast("💡 Hint: the letter " + ch + " is revealed!");
  guess(ch);
}

// ── END GAME ───────────────────────────────────────────────────
function endGame(isWin, timedOut = false) {
  if (gameOver) return;
  gameOver = true;
  clearInterval(ticker);
  hintBtn.disabled = true;
  document.querySelectorAll(".key").forEach(b => b.disabled = true);

  // Reveal full word
  guessed = new Set(word);
  renderWord();

  const mul = DIFF_CONFIG[difficulty].scoreMul;

  if (isWin) {
    const earned = Math.round((10 + timeLeft) * mul);
    score  += earned;
    streak++;
    wins++;
    if (streak > bestStreak) bestStreak = streak;
    beep("win");

    document.getElementById("resEmoji").textContent  = streak >= 3 ? "🔥" : "🏆";
    document.getElementById("resTitle").textContent  = streak >= 5 ? "UNSTOPPABLE!" : "VICTORY!";
    document.getElementById("resTitle").style.color  = "var(--success)";
    document.getElementById("resWord").textContent   = word;
    document.getElementById("resSub").textContent    =
      `+${earned} pts · Streak: ${streak} 🔥 · Difficulty: ${difficulty.toUpperCase()}`;

    document.getElementById("resultModalInner").classList.add("win-burst");
    setTimeout(() => document.getElementById("resultModalInner").classList.remove("win-burst"), 600);

  } else {
    streak = 0;
    beep("lose");

    document.getElementById("resEmoji").textContent  = timedOut ? "⏰" : "💀";
    document.getElementById("resTitle").textContent  = timedOut ? "TIME'S UP!" : "GAME OVER";
    document.getElementById("resTitle").style.color  = "var(--danger)";
    document.getElementById("resWord").textContent   = word;
    document.getElementById("resSub").textContent    =
      `The word was above · Streak reset · ${difficulty.toUpperCase()} mode`;
  }

  saveStats();
  updateStats();
  setTimeout(() => resultModal.classList.add("active"), 450);
}

// ── STATS ──────────────────────────────────────────────────────
function updateStats() {
  document.getElementById("scoreEl").textContent  = score;
  document.getElementById("streakEl").textContent = streak;
  document.getElementById("bestEl").textContent   = bestStreak;
  document.getElementById("winsEl").textContent   = wins;
}

function saveStats() {
  localStorage.setItem("hm_score",      score);
  localStorage.setItem("hm_streak",     streak);
  localStorage.setItem("hm_bestStreak", bestStreak);
  localStorage.setItem("hm_wins",       wins);
}

function resetStats() {
  if (!confirm("Reset all scores?")) return;
  score = streak = bestStreak = wins = 0;
  saveStats(); updateStats();
  showToast("📊 Stats reset!");
}

// ── NEXT WORD ──────────────────────────────────────────────────
function nextWord() {
  resultModal.classList.remove("active");
  initGame();
}

// ── TOAST ──────────────────────────────────────────────────────
let toastTmr = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => toastEl.classList.remove("show"), 2000);
}

// ── KEYBOARD INPUT ─────────────────────────────────────────────
document.addEventListener("keydown", e => {
  const ch = e.key.toUpperCase();
  if (/^[A-Z]$/.test(ch)) {
    const anyOpen = catModal.classList.contains("active") ||
                    diffModal.classList.contains("active") ||
                    resultModal.classList.contains("active");
    if (!anyOpen) guess(ch);
  }
  if (e.key === "Escape") {
    diffModal.classList.remove("active");
  }
});

// ── INIT ───────────────────────────────────────────────────────
buildKeyboard();
updateStats();
setDiff("medium");
openCatModal();
</script>
