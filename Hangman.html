<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Hangman Pro</title>

<style>
:root {
    --bg-dark: #0f172a;
    --card-bg: #1e293b;
    --primary: #38bdf8;
    --primary-hover: #0ea5e9;
    --accent-red: #ef4444;
    --accent-green: #22c55e;
    --accent-gold: #eab308;
    --text-main: #f8fafc;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    text-align: center;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.container {
    max-width: 800px;
    width: 100%;
}

h1 {
    color: var(--primary);
    margin-bottom: 5px;
    font-size: 2.5rem;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
}

.stats-bar {
    display: flex;
    justify-content: space-around;
    background: var(--card-bg);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    font-size: 1.1rem;
}

.game-area {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

@media(min-width: 600px) {
    .game-area {
        grid-template-columns: 250px 1fr;
    }
}

canvas {
    background: #334155;
    border-radius: 12px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    max-width: 100%;
}

.display-section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 20px;
    position: relative;
}

#category {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #94a3b8;
    margin-bottom: 10px;
}

#word {
    font-size: 42px;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    letter-spacing: 12px;
    margin: 15px 0;
    min-height: 60px;
}

.hint-btn {
    background: transparent;
    border: 2px solid var(--accent-gold);
    color: var(--accent-gold);
    padding: 6px 15px;
    font-size: 0.9rem;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    transition: all 0.2s ease;
}

.hint-btn:hover:not(:disabled) {
    background: var(--accent-gold);
    color: var(--bg-dark);
}

.hint-btn:disabled {
    border-color: #475569;
    color: #475569;
    cursor: not-allowed;
}

#keyboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(45px, 1fr));
    gap: 8px;
    max-width: 650px;
    margin: 20px auto;
    width: 100%;
}

button.key {
    height: 48px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    background: #475569;
    color: var(--text-main);
    font-weight: bold;
    transition: all 0.15s ease;
}

button.key:hover:not(:disabled) {
    background: var(--primary);
    transform: translateY(-2px);
}

button.key:disabled.correct {
    background: var(--accent-green);
    color: white;
    opacity: 0.8;
}

button.key:disabled.wrong {
    background: var(--accent-red);
    color: white;
    opacity: 0.4;
}

.control-box {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 15px;
}

.action-btn {
    background: var(--primary);
    color: var(--bg-dark);
    padding: 12px 30px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
}

.action-btn:hover {
    background: var(--primary-hover);
}

.secondary-btn {
    background: #475569;
    color: var(--text-main);
}

.secondary-btn:hover {
    background: #64748b;
}

.category-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
}

.cat-pick-btn {
    padding: 15px;
    font-size: 1.2rem;
}

.overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.modal {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
    max-width: 400px;
    width: 90%;
    transform: scale(0.8);
    transition: transform 0.3s ease;
}

.overlay.active .modal {
    transform: scale(1);
}

#modalTitle {
    font-size: 2rem;
    margin-top: 0;
}

.win-text { color: var(--accent-green); }
.lose-text { color: var(--accent-red); }
</style>
</head>
<body>

<div id="categoryModal" class="overlay active">
    <div class="modal">
        <h2>Choose a Category</h2>
        <p>Select a theme to start playing:</p>
        <div class="category-grid">
            <button class="action-btn cat-pick-btn" onclick="selectCategory('Countries')">🌍 Countries</button>
            <button class="action-btn cat-pick-btn" onclick="selectCategory('Sports')">⚽ Sports</button>
            <button class="action-btn cat-pick-btn" onclick="selectCategory('Animals')">🦁 Animals</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>🎯 Hangman Pro</h1>
    
    <div class="stats-bar">
        <div>Score: <span id="score">0</span></div>
        <div>Streak: <span id="streak">0</span> 🔥</div>
        <div>Best Streak: <span id="bestStreak">0</span> 👑</div>
    </div>

    <div class="game-area">
        <canvas id="hangmanCanvas" width="220" height="250"></canvas>
        
        <div class="display-section">
            <div id="category">Category: None</div>
            <div id="word"></div>
            <div id="livesDisplay">Lives left: ❤️❤️❤️❤️❤️❤️</div>
            <button id="hintBtn" class="hint-btn">💡 Get Hint (-1 Life)</button>
        </div>
    </div>

    <div id="keyboard"></div>
    
    <div class="control-box">
        <button id="restart" class="action-btn">Next Word</button>
        <button id="changeCategoryBtn" class="action-btn secondary-btn">Change Category</button>
    </div>
</div>

<div id="gameModal" class="overlay">
    <div class="modal">
        <h2 id="modalTitle">You Win!</h2>
        <p id="modalMessage">The word was indeed blank</p>
        <button id="modalBtn" class="action-btn">Play Again</button>
    </div>
</div>

<script>
const dictionary = {
    Countries: ["PAKISTAN", "GERMANY", "AUSTRALIA", "BRAZIL", "JAPAN", "CANADA", "EGYPT", "FRANCE", "ITALY"],
    Sports: ["CRICKET", "FOOTBALL", "BASKETBALL", "BADMINTON", "ATHLETICS", "TENNIS", "HOCKEY", "BOXING"],
    Animals: ["LION", "ELEPHANT", "TIGER", "KANGAROO", "GIRAFFE", "DOLPHIN", "PANDA", "MONKEY", "CHEETAH"]
};

let currentCategory = "";
let selectedWord = "";
let guessedLetters = new Set();
let wrongLettersCount = 0;
const maxLives = 6;

let score = parseInt(localStorage.getItem('hm_score')) || 0;
let streak = parseInt(localStorage.getItem('hm_streak')) || 0;
let bestStreak = parseInt(localStorage.getItem('hm_bestStreak')) || 0;

const canvas = document.getElementById("hangmanCanvas");
const ctx = canvas.getContext("2d");
const wordDiv = document.getElementById("word");
const categoryDiv = document.getElementById("category");
const livesDisplay = document.getElementById("livesDisplay");
const keyboardDiv = document.getElementById("keyboard");
const gameModal = document.getElementById("gameModal");
const categoryModal = document.getElementById("categoryModal");
const hintBtn = document.getElementById("hintBtn");

function playSound(type) {
    const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.connect(gain);
    gain.connect(ctxAudio.destination);

    if (type === 'correct') {
        osc.frequency.setValueAtTime(523.25, ctxAudio.currentTime);
        osc.frequency.setValueAtTime(659.25, ctxAudio.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctxAudio.currentTime);
        osc.start(); osc.stop(ctxAudio.currentTime + 0.25);
    } else if (type === 'wrong') {
        osc.frequency.setValueAtTime(220, ctxAudio.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, ctxAudio.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctxAudio.currentTime);
        osc.start(); osc.stop(ctxAudio.currentTime + 0.2);
    } else if (type === 'win') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(587.33, ctxAudio.currentTime);
        osc.frequency.setValueAtTime(880, ctxAudio.currentTime + 0.1);
        osc.frequency.setValueAtTime(1174.66, ctxAudio.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ctxAudio.currentTime);
        osc.start(); osc.stop(ctxAudio.currentTime + 0.4);
    }
}

function drawHangman(step) {
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#f8fafc";
    
    switch(step) {
        case 0:
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#64748b";
            ctx.beginPath();
            ctx.moveTo(20, 230); ctx.lineTo(180, 230);
            ctx.moveTo(50, 230); ctx.lineTo(50, 20);
            ctx.lineTo(140, 20);
            ctx.lineTo(140, 50);
            ctx.stroke();
            break;
        case 1:
            ctx.beginPath(); ctx.arc(140, 70, 20, 0, Math.PI * 2); ctx.stroke();
            break;
        case 2:
            ctx.beginPath(); ctx.moveTo(140, 90); ctx.lineTo(140, 160); ctx.stroke();
            break;
        case 3:
            ctx.beginPath(); ctx.moveTo(140, 110); ctx.lineTo(110, 130); ctx.stroke();
            break;
        case 4:
            ctx.beginPath(); ctx.moveTo(140, 110); ctx.lineTo(170, 130); ctx.stroke();
            break;
        case 5:
            ctx.beginPath(); ctx.moveTo(140, 160); ctx.lineTo(110, 200); ctx.stroke();
            break;
        case 6:
            ctx.beginPath(); ctx.moveTo(140, 160); ctx.lineTo(170, 200); ctx.stroke();
            break;
    }
}

function selectCategory(categoryName) {
    currentCategory = categoryName;
    categoryModal.classList.remove("active");
    initGame();
}

function initGame() {
    if (!currentCategory) {
        categoryModal.classList.add("active");
        return;
    }

    const wordPool = dictionary[currentCategory];
    selectedWord = wordPool[Math.floor(Math.random() * wordPool.length)];
    
    guessedLetters.clear();
    wrongLettersCount = 0;
    gameModal.classList.remove("active");
    hintBtn.disabled = false;
    
    document.getElementById("score").textContent = score;
    document.getElementById("streak").textContent = streak;
    document.getElementById("bestStreak").textContent = bestStreak;
    
    categoryDiv.textContent = `Category: ${currentCategory}`;
    livesDisplay.textContent = "Lives left: " + "❤️".repeat(maxLives - wrongLettersCount);
    
    drawHangman(0);
    buildKeyboard();
    updateWordDisplay();
}

function buildKeyboard() {
    keyboardDiv.innerHTML = "";
    for (let i = 65; i <= 90; i++) {
        const letter = String.fromCharCode(i);
        const btn = document.createElement("button");
        btn.textContent = letter;
        btn.classList.add("key");
        btn.id = `key-${letter}`;
        btn.onclick = () => handleGuess(letter);
        keyboardDiv.appendChild(btn);
    }
}

function updateWordDisplay() {
    let htmlStr = "";
    let complete = true;
    
    for (let char of selectedWord) {
        if (guessedLetters.has(char)) {
            htmlStr += char + " ";
        } else {
            htmlStr += "_ ";
            complete = false;
        }
    }
    wordDiv.textContent = htmlStr.trim();
    return complete;
}

function handleGuess(letter) {
    if (guessedLetters.has(letter) || wrongLettersCount >= maxLives) return;
    
    guessedLetters.add(letter);
    const keyBtn = document.getElementById(`key-${letter}`);
    if (keyBtn) keyBtn.disabled = true;

    if (selectedWord.includes(letter)) {
        if(keyBtn) keyBtn.classList.add("correct");
        playSound('correct');
        
        const isWon = updateWordDisplay();
        if (isWon) endGame(true);
    } else {
        if(keyBtn) keyBtn.classList.add("wrong");
        wrongLettersCount++;
        playSound('wrong');
        drawHangman(wrongLettersCount);
        livesDisplay.textContent = "Lives left: " + "❤️".repeat(maxLives - wrongLettersCount);
        
        if (wrongLettersCount >= maxLives) endGame(false);
    }
}

hintBtn.onclick = () => {
    if ((maxLives - wrongLettersCount) <= 1) {
        alert("Not enough lives left to buy a hint!");
        return;
    }

    const missingLetters = [...selectedWord].filter(letter => !guessedLetters.has(letter));
    
    if (missingLetters.length > 0) {
        const randomHintLetter = missingLetters[Math.floor(Math.random() * missingLetters.length)];
        wrongLettersCount++;
        drawHangman(wrongLettersCount);
        livesDisplay.textContent = "Lives left: " + "❤️".repeat(maxLives - wrongLettersCount);
        handleGuess(randomHintLetter);
    }
};

function endGame(isWin) {
    const modalTitle = document.getElementById("modalTitle");
    const modalMessage = document.getElementById("modalMessage");
    
    if (isWin) {
        score += 10;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        
        modalTitle.textContent = "🎉 Victory!";
        modalTitle.className = "win-text";
        modalMessage.textContent = `Magnificent! You solved the word "${selectedWord}".`;
        playSound('win');
    } else {
        streak = 0;
        modalTitle.textContent = "💀 Game Over";
        modalTitle.className = "lose-text";
        modalMessage.textContent = `The right word was: ${selectedWord}`;
        playSound('wrong');
    }
    
    localStorage.setItem('hm_score', score);
    localStorage.setItem('hm_streak', streak);
    localStorage.setItem('hm_bestStreak', bestStreak);
    
    document.querySelectorAll(".key").forEach(b => b.disabled = true);
    hintBtn.disabled = true;
    setTimeout(() => gameModal.classList.add("active"), 400);
}

document.addEventListener("keydown", (e) => {
    const key = e.key.toUpperCase();
    const modalsOpen = gameModal.classList.contains("active") || categoryModal.classList.contains("active");
    if (key.match(/^[A-Z]$/) && !modalsOpen) {
        handleGuess(key);
    }
});

document.getElementById("restart").onclick = initGame;
document.getElementById("modalBtn").onclick = initGame;
document.getElementById("changeCategoryBtn").onclick = () => {
    categoryModal.classList.add("active");
};

window.onload = () => {
    categoryModal.classList.add("active");
};
</script>

</body>
</html>
