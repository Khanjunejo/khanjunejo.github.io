<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your account securely.">
  <title>Login – My App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f7fa;
      --surface:   #ffffff;
      --primary:   #4f46e5;
      --primary-h: #4338ca;
      --text:      #1e1b4b;
      --muted:     #6b7280;
      --border:    #e5e7eb;
      --error:     #dc2626;
      --success:   #16a34a;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(79,70,229,.10);
    }

    body.dark {
      --bg:      #0f0e17;
      --surface: #1a1a2e;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --border:  #2d2d4e;
      --shadow:  0 4px 24px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background .3s, color .3s;
    }

    #themeToggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background .3s, border .3s;
      z-index: 100;
    }
    #themeToggle:hover { background: var(--border); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      transition: background .3s, border .3s;
    }

    .card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .card .subtitle {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border .2s, background .3s;
    }
    input:focus { border-color: var(--primary); }

    .password-box { position: relative; }
    .password-box input { padding-right: 44px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      color: var(--muted);
      padding: 0;
    }
    .eye-btn:hover { color: var(--primary); }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: .8rem;
      color: var(--primary);
      text-decoration: none;
      margin-top: 6px;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-submit:hover  { background: var(--primary-h); }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    #loginError {
      font-size: .85rem;
      color: var(--error);
      min-height: 20px;
      margin-top: 10px;
      text-align: center;
    }
    #loginSuccess {
      font-size: .85rem;
      color: var(--success);
      min-height: 20px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .card-footer {
      text-align: center;
      font-size: .85rem;
      color: var(--muted);
      margin-top: 20px;
    }
    .card-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .card-footer a:hover { text-decoration: underline; }

    .policy-link {
      display: block;
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      margin-top: 12px;
    }
    .policy-link a { color: var(--muted); text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <button id="themeToggle" aria-label="Toggle dark mode">🌙</button>

  <div class="card" role="main">
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to your account.</p>

    <div class="field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com"
             autocomplete="email" required>
    </div>

    <div class="field">
      <label for="loginPassword">Password</label>
      <div class="password-box">
        <input type="password" id="loginPassword" placeholder="Enter your password"
               autocomplete="current-password" required>
        <button type="button" class="eye-btn" onclick="togglePassword('loginPassword')"
                aria-label="Show or hide password">👁️</button>
      </div>
      <a href="forgot.html" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log In</button>

    <p id="loginError" role="alert" aria-live="polite"></p>
    <p id="loginSuccess" role="status" aria-live="polite">
      ✅ Login successful! Redirecting…
    </p>

    <p class="card-footer">
      No account? <a href="signup.html">Sign Up</a>
    </p>

    <span class="policy-link">
      <a href="privacy.html">Privacy Policy</a> &amp;
      <a href="terms.html">Terms of Service</a>
    </span>
  </div>

  <script>
    (function () {
      const btn = document.getElementById('themeToggle');
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') { document.body.classList.add('dark'); btn.textContent = '☀️'; }

      btn.addEventListener('click', function () {
        const isDark = document.body.classList.toggle('dark');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    })();

    function togglePassword(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function handleLogin() {
      const errorEl   = document.getElementById('loginError');
      const successEl = document.getElementById('loginSuccess');
      const btn       = document.getElementById('loginBtn');

      errorEl.textContent = '';
      successEl.style.display = 'none';

      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email) { errorEl.textContent = 'Please enter your email.'; return; }
      if (!validateEmail(email)) { errorEl.textContent = 'Please enter a valid email address.'; return; }
      if (!password) { errorEl.textContent = 'Please enter your password.'; return; }

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user  = users.find(u => u.email === email && u.password === password);

      if (!user) {
        errorEl.textContent = 'Incorrect email or password. Please try again.';
        return;
      }

      localStorage.setItem('loggedInUser', JSON.stringify({ username: user.username, email: user.email }));

      btn.disabled = true;
      successEl.style.display = 'block';

      setTimeout(function () {
        window.location.href = 'dashboard.html';
      }, 1800);
    }
  </script>

</body>
</html>
